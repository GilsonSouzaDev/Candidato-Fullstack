server {
    listen 80;
    server_name gilsonsouzaportfolio.duckdns.org livrariales.duckdns.org atscandidato.duckdns.org;

    # Necessário para o Certbot validar o domínio e gerar o SSL
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redireciona tráfego HTTP para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# 1. Host gilsonsouzaportfolio
server {
    listen 443 ssl;
    server_name gilsonsouzaportfolio.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/gilsonsouzaportfolio.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gilsonsouzaportfolio.duckdns.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location ^~ /images/ {
        proxy_pass http://backend:8080/images/;
    }

    location ^~ /assets/docs/ {
        proxy_pass http://backend:8080/assets/docs/;
    }

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        proxy_pass http://backend:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

