<div class="container auth-container">
  <div class="glass-card auth-card">
    <div class="auth-header">
      <div class="auth-icon-wrapper">
        <mat-icon>how_to_reg</mat-icon>
      </div>
      <h2 class="premium-title">Nova Conta Candidato</h2>
      <p class="auth-subtitle">Crie seu acesso para se candidatar às nossas vagas.</p>
    </div>
    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label>Nome Completo</label>
        <div class="input-with-icon">
          <mat-icon>badge</mat-icon>
          <input type="text" [(ngModel)]="nome" name="nome" required placeholder="João Silva" class="premium-input">
        </div>
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <div class="input-with-icon">
          <mat-icon>email</mat-icon>
          <input type="email" [(ngModel)]="email" name="email" required placeholder="joao@email.com" class="premium-input">
        </div>
      </div>
      <div class="form-group">
        <label>Criar Senha</label>
        <div class="input-with-icon">
          <mat-icon>lock</mat-icon>
          <input type="password" [(ngModel)]="senha" name="senha" required placeholder="Mínimo 8 caracteres" class="premium-input">
        </div>
      </div>
      
      <div *ngIf="error" class="error-msg">
        <mat-icon>error_outline</mat-icon> {{error}}
      </div>
      <div *ngIf="success" class="success-msg-inline">
        <mat-icon>check_circle</mat-icon> {{success}}
      </div>
      
      <button type="submit" class="premium-btn auth-submit-btn">Registrar Acesso</button>
    </form>
    <div class="auth-footer">
      <p>Já possui conta?</p>
      <a routerLink="/login" class="auth-link">Faça Login</a>
    </div>
  </div>
</div>
