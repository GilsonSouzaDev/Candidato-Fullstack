<div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
  <div class="glass-card" style="width: 100%; max-width: 420px;">
    <h2 class="premium-title" style="text-align: center; font-size: 1.8rem;">Nova Conta ATS</h2>
    <form (ngSubmit)="onSubmit()">
      <div style="margin-bottom: 20px;">
        <label>Nome Completo</label>
        <input type="text" [(ngModel)]="nome" name="nome" required placeholder="João Silva" style="width: 100%; box-sizing: border-box;">
      </div>
      <div style="margin-bottom: 20px;">
        <label>E-mail Corporativo</label>
        <input type="email" [(ngModel)]="email" name="email" required placeholder="joao@empresa.com" style="width: 100%; box-sizing: border-box;">
      </div>
      <div style="margin-bottom: 24px;">
        <label>Criar Senha</label>
        <input type="password" [(ngModel)]="senha" name="senha" required placeholder="Mínimo 8 caracteres" style="width: 100%; box-sizing: border-box;">
      </div>
      
      <p style="color: var(--secondary-color); font-size: 0.9rem; text-align: center;" *ngIf="error">{{error}}</p>
      <p style="color: #10b981; font-size: 0.9rem; text-align: center;" *ngIf="success">{{success}}</p>
      
      <button type="submit" class="premium-btn" style="width: 100%; padding: 14px; font-size: 1rem;">Registrar Acesso</button>
    </form>
    <p style="text-align: center; margin-top: 24px; color: var(--text-muted); font-size: 0.95rem;">
      Já é recrutador? <a routerLink="/login" style="color: var(--primary-color); font-weight: 600; text-decoration: none;">Faça Login</a>
    </p>
  </div>
</div>
