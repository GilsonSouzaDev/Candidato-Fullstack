<div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
  <div class="glass-card" style="width: 100%; max-width: 420px;">
    <h2 class="premium-title" style="text-align: center; font-size: 1.8rem;">Login ATS</h2>
    <form (ngSubmit)="onSubmit()">
      <div style="margin-bottom: 20px;">
        <label>E-mail Corporativo</label>
        <input type="email" [(ngModel)]="email" name="email" required placeholder="recrutador@empresa.com" style="width: 100%; box-sizing: border-box;">
      </div>
      <div style="margin-bottom: 24px;">
        <label>Senha</label>
        <input type="password" [(ngModel)]="senha" name="senha" required placeholder="••••••••" style="width: 100%; box-sizing: border-box;">
      </div>
      
      <p style="color: var(--secondary-color); font-size: 0.9rem; text-align: center;" *ngIf="error">{{error}}</p>
      
      <button type="submit" class="premium-btn" style="width: 100%; padding: 14px; font-size: 1rem;">Entrar no Sistema</button>
    </form>
    <p style="text-align: center; margin-top: 24px; color: var(--text-muted); font-size: 0.95rem;">
      Não possui acesso? <a routerLink="/register" style="color: var(--primary-color); font-weight: 600; text-decoration: none;">Solicite aqui</a>
    </p>
  </div>
</div>
