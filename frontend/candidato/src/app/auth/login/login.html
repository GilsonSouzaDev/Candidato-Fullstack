<div class="container auth-container">
  <div class="glass-card auth-card">
    <div class="auth-header">
      <div class="auth-icon-wrapper">
        <mat-icon>person</mat-icon>
      </div>
      <h2 class="premium-title">Login ATS</h2>
      <p class="auth-subtitle">Acesse sua conta para utilizar o portal.</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label>E-mail</label>
        <div class="input-with-icon">
          <mat-icon>email</mat-icon>
          <input type="email" [(ngModel)]="email" name="email" required placeholder="seu-email@exemplo.com" class="premium-input">
        </div>
      </div>
      
      <div class="form-group">
        <label>Senha</label>
        <div class="input-with-icon">
          <mat-icon>lock</mat-icon>
          <input type="password" [(ngModel)]="senha" name="senha" required placeholder="••••••••" class="premium-input">
        </div>
      </div>
      
      <div *ngIf="error" class="error-msg">
        <mat-icon>error_outline</mat-icon> {{error}}
      </div>
      
      <button type="submit" class="premium-btn auth-submit-btn">Entrar no Sistema</button>
    </form>
    
    <div class="auth-footer">
      <p>Não possui acesso?</p>
      <a routerLink="/register" class="auth-link">Solicite aqui</a>
    </div>
  </div>
</div>
