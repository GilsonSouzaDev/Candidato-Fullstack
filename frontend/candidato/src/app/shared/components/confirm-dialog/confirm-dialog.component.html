<div class="dialog-container">
  <h2 mat-dialog-title class="premium-title center-align" style="margin-bottom: 16px;">Tela de Confirmação</h2>
  <mat-dialog-content class="center-align" style="color: var(--text-muted); text-align: center; margin-bottom: 24px;">{{ data }}</mat-dialog-content>
  <mat-dialog-actions class="justify-center" style="gap: 16px;">
    <button class="premium-btn secondary" (click)="cancel()">Cancelar</button>
    <button class="premium-btn" (click)="confirm()">Confirmar</button>
  </mat-dialog-actions>
</div>
