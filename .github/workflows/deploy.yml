name: CI/CD Pipeline - Candidato Fullstack

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build-backend-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: gilsonsouzadev
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend/candidato
          file: ./backend/candidato/Dockerfile
          push: true
          platforms: linux/arm64
          tags: gilsonsouzadev/candidato-api:latest

  build-frontend-and-deploy-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd frontend/candidato
          npm ci

      - name: Build Angular Frontend
        run: |
          cd frontend/candidato
          npm run build -- --configuration=production --base-href=/Candidato-Fullstack/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/candidato/dist/candidato

  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-backend-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy Backend to VM via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            mkdir -p /opt/candidato-fullstack
            cd /opt/candidato-fullstack
            cat << 'EOF' > docker-compose.yml
            version: '3.8'
            services:
              backend:
                image: gilsonsouzadev/candidato-api:latest
                container_name: candidato-backend
                restart: always
                environment:
                  - ASPNETCORE_ENVIRONMENT=Production
                  - DatabaseProvider=Oracle
                  - ConnectionStrings__OracleConnection=User Id=CANDIDATO_USER;Password=${{ secrets.ORACLE_PASSWORD }};Data Source=livrariadb_low;
                volumes:
                  - /opt/candidato-fullstack/Wallet:/app/Wallet
                  - /opt/candidato-fullstack/uploads:/app/wwwroot/uploads
                ports:
                  - "8082:8080"
                networks:
                  - web-network
            networks:
              web-network:
                external: true
            EOF
            docker compose pull backend
            docker compose down backend --remove-orphans
            docker compose up -d backend
